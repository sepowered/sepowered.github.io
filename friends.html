<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Friends - KokoaTalk</title>
</head>
<body>
    <div class="status-bar">
        <!--BEM(Block Element Modifier)-->
        <div class="status-bar__column">
            <i class="fas fa-signal"></i>
            <span>Verizon</span>
        </div>
        <div class="status-bar__column">
            <span>9:41</span>
        </div>
        <div class="status-bar__column">
            <span>80%</span>
            <i class="fas fa-battery-three-quarters fa-lg"></i>
            <i class="fas fa-bolt"></i>
        </div>
    </div>

    <header class="view-header">
        <h1 class="view-header__title">Friends</h1>
        <div class="view-header__icons">
            <span><i class="fas fa-search fa-lg"></i></span>
            <span><i class="fas fa-music fa-lg"></i></span>
            <span><i class="fas fa-cog fa-lg"></i></span>
        </div>
    </header>

    <a id=friends-display-link><i class="fas fa-info-circle"></i>Friends' Names Display<i class="fas fa-chevron-right fa-xs"></i></a>

    <main class="friends-view">
        <div class="user-comp">
            <div class="user-comp__column">
                <img src="res/profile01.png" class="user-comp__avatar--xl">
                <div class="user-comp__text">
                <h4 class="user-comp__title">Sans</h4>
                <!--<h6 class="user-comp__subtitle">Pen Pineapple Apple Pen</h6>-->
            </div>
        </div>
        <div class="user-comp__column"></div>
    </div>
    <div class="friends-view__channel">
        <div class="friends-view__channel-header">
            <span>Channel</span>
            <i class="fas fa-chevron-up fa-xs"></i>
        </div>
        <div class="user-comp">
            <div class="user-comp__column">
                <img src="res/profile01.png" class="user-comp__avatar--sm">
                <div class="user-comp__text">
                    <h4 class="user-comp__title user-comp__title--not-bold">Channel</h4>
                </div>
            </div>
            <div class="user-comp__column">
                <div>
                  <span>2</span>
                  <i class="fas fa-chevron-right fa-xs"></i>
                </div>
            </div>    
        </div>
        
    </div>
    </main>



    <!--Navigation은 보통 ul에 li를 사용해서 만들어진다.-->
    <nav class="nav">
        <ul class="nav__li" >
            <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="fas fa-user fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="chat.html">
                <span class="nav__notification badge">1</span><i class="far fa-comment fa-2x"></i></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="more.html"><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
        </ul>
    </nav>

    <div id="splash-screen">
        <i class="fas fa-comment"></i>
    </div>

    <div id="no-mobile">
        <span>Sorry, We are not supporting this service on the desktop right now.</span>
    </div>

    <!--JS는 항상 Body끝쪽, 마지막에 가있어야 한다.-->
    <script src="https://kit.fontawesome.com/6478f529f2.js" crossorigin="anonymous">
    </script>
</body>
</html>
