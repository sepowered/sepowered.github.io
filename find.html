<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Find - KokoaTalk</title>
</head>
<body>
    <div class="status-bar">
        <!--BEM(Block Element Modifier)-->
        <div class="status-bar__column">
            <i class="fas fa-signal"></i>
            <span>Verizon</span>
        </div>
        <div class="status-bar__column">
            <span>9:41</span>
        </div>
        <div class="status-bar__column">
            <span>80%</span>
            <i class="fas fa-battery-three-quarters fa-lg"></i>
            <i class="fas fa-bolt"></i>
        </div>
    </div>
    <header class="view-header">
        <h1 class="view-header__title">Find</h1>
        <div class="view-header__icons">
            <span><i class="fas fa-search fa-lg"></i></span>
            <span><i class="fas fa-cog fa-lg"></i></span>
        </div>
    </header>

    <main class="main-screen">
        <div class="icon-row">
            <div class="icon-row__icon"><i class="fas fa-qrcode"></i><span>QR Code</span></div>
            <div class="icon-row__icon"><i class="far fa-address-book"></i><span>Add by Contacts</span></div>
            <div class="icon-row__icon"><i class="fas fa-at"></i><span>Add by ID</span></div>
            <div class="icon-row__icon"><i class="far fa-envelope-open"></i><span>Invite</span></div>
        </div>
        <div class="recommended-friends">
            <h6 class="recommended-friends_title">Recommended Friends</h6>
            <span>You have no recommended friends.</span>
        </div>
        <div class="open-chat">
            <div class="open-chat__header">
                <h4 class="open-chat__title">Open Chat</h4>
                <span>Go to Openchat Home <i class="fas fa-chevron-right fa-xs"></i></span>
                
            </div>
            <div class="open-post">
                <div class="open-post__column">
                    <h5 class="open-post__title">Wow Sans!!</h5>
                    <h6 class="open-post__tags">#ppap #gaegulzam</h6>
                    <div class="open-post__members">
                        <img src="res/profile01.png" >
                        <span class="open-post__member-count">802 members</span>
                        <div class="divider"></div>
                        <span class="open-post__member-status">Active</span>
                    </div>
                </div>
                <div class="open-post__column">
                    <div class="open-post__cover">
                        <img src="res/profile01.png">
                        <div class="open-post__like-count"><i class="fas fa-heart fa-xs"></i> <span>128</span> </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </main>

    <nav class="nav">
        <ul class="nav__li" >
            <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="far fa-user fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="chat.html">
                <span class="nav__notification badge">1</span><i class="far fa-comment fa-2x"></i></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="more.html"><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
        </ul>
    </nav>
    <div id="no-mobile">
        <span>Sorry, We are not supporting this service on the desktop right now.</span>
    </div>
    <script src="https://kit.fontawesome.com/6478f529f2.js" crossorigin="anonymous">
    </script>
</body>
</html>
